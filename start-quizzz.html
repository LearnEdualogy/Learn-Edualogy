<style>
.quiz-container{
  max-width:650px;
  margin:30px auto;
  background:#455a64;
  padding:30px;
  border-radius:25px;
  color:#fff;
  text-align:center;
  font-family:'Noto Sans Kannada',sans-serif;
}

/* Start Section */
.start-box{
  background:#2f3f46;
  padding:35px 25px;
  border-radius:20px;
  line-height:1.8;
}

.start-box h3{
  font-size:28px;
  margin-bottom:25px;
}

.start-box ul{
  list-style:none;
  padding:0;
  margin:0 0 30px 0;
}

.start-box li{
  margin-bottom:14px;
  font-size:18px;
}

.start-box button{
  background:linear-gradient(45deg,#2196f3,#1e88e5);
  padding:14px 32px;
  font-size:18px;
  border:none;
  border-radius:12px;
  cursor:pointer;
  transition:0.3s;
  color:white;
}

.start-box button:hover{
  transform:scale(1.05);
}

/* Quiz Section */
.question{
  font-size:20px;
  font-weight:bold;
  margin-bottom:15px;
  color:orange;
}

.answers label{
  display:block;
  background:#90a4ae;
  padding:12px;
  margin:10px 0;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
  color:#222;
}

.answers label:hover{
  opacity:0.9;
}

.correct{background:#4caf50!important;color:#fff;}
.wrong{background:#f44336!important;color:#fff;}

.explanation{
  margin-top:15px;
  padding:12px;
  background:#263238;
  border-radius:8px;
  font-size:15px;
}

.timer{
  margin-bottom:10px;
  font-size:16px;
}

button{
  padding:10px 18px;
  border:none;
  background:#2196f3;
  color:#fff;
  border-radius:8px;
  cursor:pointer;
  margin-top:15px;
}
</style>

<div class="quiz-container">

<div id="startSection" class="start-box">
  <h3>ಕ್ವಿಜ್ ಸೂಚನೆಗಳು</h3>
  <ul>
    <li>1️⃣ ಪ್ರತಿಯೊಂದು ಪ್ರಶ್ನೆಗೆ 30 ಸೆಕೆಂಡು ಸಮಯ ಇದೆ.</li>
    <li>2️⃣ ಸರಿಯಾದ ಉತ್ತರ ಆಯ್ಕೆ ಮಾಡಿದರೆ ಅಂಕ ಸಿಗುತ್ತದೆ.</li>
    <li>3️⃣ ಪ್ರತಿಯೊಂದು ಪ್ರಶ್ನೆಯ ನಂತರ ವಿವರಣೆ ತೋರಿಸಲಾಗುತ್ತದೆ.</li>
    <li>4️⃣ ಎಲ್ಲಾ ಪ್ರಶ್ನೆಗಳಿಗೆ ಉತ್ತರಿಸಿದ ನಂತರ ನಿಮ್ಮ ಫಲಿತಾಂಶ ಕಾಣುತ್ತದೆ.</li>
  </ul>
  <button onclick="startQuiz()">Start Quiz</button>
</div>

<div id="quiz" style="display:none;"></div>
<div id="result"></div>
<button id="nextBtn" onclick="nextQuestion()" style="display:none;">ಮುಂದೆ</button>
<button id="restartBtn" onclick="restartQuiz()" style="display:none;">ಮರುಪ್ರಾರಂಭಿಸಿ</button>

<audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
<audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

</div>

        answers: ["ವಿಜಯಲಕ್ಷ್ಮಿ ಪಂಡಿತ್", "ಸರೋಜಿನಿ ನಾಯ್ಡು", "ಪ್ರತಿಭಾ ಪಾಟೀಲ್", "ಇಂದಿರಾ ಗಾಂಧಿ"],

        answers: ["ಎಂ.ಎಸ್.ಸ್ವಾಮಿನಾಥನ್", "ವರ್ಗೀಸ್ ಕುರಿಯನ್", "ಧೀರೂಭಾಯಿ ಅಂಬಾನಿ", "ಸಿ.ವಿ.ರಾಮನ್"],

      },
      {
       
        question: "ಜನ ಗಣ ಮನ ಯಾವ ಭಾಷೆಯಲ್ಲಿ ರಚಿಸಲಾಗಿದೆ?",
        answers: ["ಹಿಂದಿ", "ಸಂಸ್ಕೃತ", "ಬೆಂಗಾಲಿ", "ಉರ್ದು"],

        answers: ["ಎಸ್.ಎಲ್. ಭೈರಪ್ಪ", "ಯು.ಆರ್. ಅನಂತಮೂರ್ತಿ", "ಪಿ. ಲಂಕೇಶ್", "ಚಂದ್ರಶೇಖರ ಕಂಬಾರ"],
        correct: 1,
        explanation:"ಕೃಷ್ಣಾ ನದಿ ಕರ್ನಾಟಕದ ಅತಿ ಉದ್ದದ ನದಿಯಾಗಿದ್ದು ರಾಜ್ಯದ ಅನೇಕ ಜಿಲ್ಲೆಗಳ ಮೂಲಕ ಹರಿಯುತ್ತದೆ."

        answers: ["ಗಿರೀಶ್ ಕಾರ್ನಾಡ್", "ಶಿವರಾಮ ಕಾರಂತ", "ವಿನಾಯಕ ಕೃಷ್ಣ ಗೋಕಾಕ್", "ಮಾಸ್ತಿ ವೆಂಕಟೇಶ ಅಯ್ಯಂಗಾರ್"],
        correct: 1,

      },
      {
       
        question: "12ನೇ ಶತಮಾನದ ವಚನ ಸಾಹಿತ್ಯ ಚಳುವಳಿಯ ನೇತೃತ್ವ ವಹಿಸಿದ್ದವರು ಯಾರು?",
        answers: ["ಕುಮಾರವ್ಯಾಸ", "ಬಸವಣ್ಣ", "ಪಂಪ", "ರನ್ನ"],
        correct: 1,

let currentQuestion=0;
let correctAnswers=0;
let wrongAnswers=0;
let timer;

function playSound(id){
const s=document.getElementById(id);
s.currentTime=0;
s.play().catch(()=>{});
}

function startQuiz(){
document.getElementById("startSection").style.display="none";
document.getElementById("quiz").style.display="block";
showQuestion();
}

function showQuestion(){
clearInterval(timer);
document.getElementById("nextBtn").style.display="none";
const q=questions[currentQuestion];
document.getElementById("quiz").innerHTML=`
<div class="question">${currentQuestion+1}. ${q.question}</div>
<div class="timer">⏳ <span id="time">30</span> ಸೆಕೆಂಡು</div>
<div class="answers">
${q.answers.map((a,i)=>
`<label onclick="selectAnswer(${i})" id="opt${i}">${a}</label>`
).join("")}
</div>
<div id="explanationBox"></div>`;
countdown(30);
}

function selectAnswer(selected){
clearInterval(timer);
const q=questions[currentQuestion];

q.answers.forEach((_,i)=>{
const el=document.getElementById("opt"+i);
el.onclick=null;
if(i===q.correct) el.classList.add("correct");
else if(i===selected) el.classList.add("wrong");
});

if(selected===q.correct){
correctAnswers++;
playSound("correctSound");
}else{
wrongAnswers++;
playSound("wrongSound");
}

document.getElementById("explanationBox").innerHTML=
`<div class="explanation">✔ ವಿವರಣೆ: ${q.explanation}</div>`;

document.getElementById("nextBtn").style.display="inline-block";
}

function nextQuestion(){
currentQuestion++;
if(currentQuestion<questions.length){
showQuestion();
}else{
showResult();
}
}

function countdown(sec){
let time=sec;
const t=document.getElementById("time");
timer=setInterval(()=>{
time--;
t.innerHTML=time;
if(time<=0){
clearInterval(timer);
selectAnswer(-1);
}
},1000);
}

function showResult(){
document.getElementById("quiz").innerHTML="";
document.getElementById("nextBtn").style.display="none";
document.getElementById("result").innerHTML=
`<h3>ಫಲಿತಾಂಶ</h3>
<p>ಸರಿಯಾದ ಉತ್ತರಗಳು: ${correctAnswers}</p>
<p>ತಪ್ಪಾದ ಉತ್ತರಗಳು: ${wrongAnswers}</p>
<p>ಒಟ್ಟು ಅಂಕಗಳು: ${correctAnswers}/${questions.length}</p>`;
document.getElementById("restartBtn").style.display="inline-block";
}

function restartQuiz(){
currentQuestion=0;
correctAnswers=0;
wrongAnswers=0;
document.getElementById("result").innerHTML="";
document.getElementById("restartBtn").style.display="none";
document.getElementById("startSection").style.display="block";
document.getElementById("quiz").style.display="none";
}
</script>
