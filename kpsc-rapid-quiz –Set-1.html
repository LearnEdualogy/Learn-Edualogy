

<html lang="kn">
<head>
  <meta charset="UTF-8"></meta>
  <meta content="width=device-width, initial-scale=1.0" name="viewport"></meta>
  <title>ಕನ್ನಡ ಕ್ವಿಜ್</title>
  <style>
    body {
      font-family: 'Noto Sans Kannada', sans-serif;
      background-color: #607d8b;
      margin: 0 auto;
      padding: 0 auto;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .quiz-container {
      max-width: 600px;
      background: #455a64;
      padding: 20px;
      margin: 100px auto;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
      text-align: center;
    }
    .question-block {
      margin-bottom: 20px;
      padding: 15px;
      background: #37474f;
      border-radius: 8px;
    }
    .question {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 10px;
      color: orange;
    }
    
    .answers label {
      display: block;
      background: #90a4ae;
      padding: 15px;
      margin-bottom: 12px;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.3s;
      font-size: 17px;
      font-weight: bold;
      color: #222;
    }
    .answers label:hover {
      background: #b0bec5;
    }
    .correct {
      background-color: #4caf50 !important;
      color: white;
    }
    .wrong {
      background-color: #f44336 !important;
      color: white;
    }
    .hidden {
      display: none;
    }
    .result {
      font-size: 20px;
      font-weight: bold;
      margin: 20px 0;
    }
    .timer {
      font-size: 16px;
      text-align: right;
      margin-bottom: 10px;
    }
    .social-icons {
      margin-top: 20px;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    .social-icons a img {
      width: 34px;
      height: 34px;
    }
    .follow-text {
      text-align: center;
      margin-top: 10px;
      font-size: 16px;
    }
    .button-group {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-top: 10px;
      flex-wrap: wrap;
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #2196f3;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }
    button:hover {
      background: #1976d2;
    }
    #restartBtn {
      display: none;
    }
  </style>
</head>
<body>
  <div class="quiz-container">
    <div id="quiz"></div>
    <div class="result" id="result"></div>
    <div class="button-group">
      <button id="nextBtn" onclick="nextQuestion()" style="display: none;">ಮುಂದೆ</button>
      <button id="restartBtn" onclick="restartQuiz()">ಮರುಪ್ರಾರಂಭಿಸಿ</button>
    </div>
    <div class="social-icons">
      <a href="https://www.youtube.com/@EduologyKannada" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/youtube.svg" /></a>
      <a href="https://www.facebook.com/learnedualogy" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/facebook.svg" /></a>
      <a href="https://www.instagram.com/eduology_kannada" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/instagram.svg" /></a>
      <a href="https://www.pinterest.com/EduologyKannada" target="_blank"><img src="https://cdn.jsdelivr.net/gh/simple-icons/simple-icons/icons/pinterest.svg" /></a>
    </div>
    <div class="follow-text">Follow Eduology Kannada</div>
  </div>

  <audio id="timerSound" src="https://assets.mixkit.co/active_storage/sfx/1418705/1418705-preview.mp3"></audio>
  <audio id="correctSound" src="https://actions.google.com/sounds/v1/cartoon/clang_and_wobble.ogg"></audio>
  <audio id="wrongSound" src="https://actions.google.com/sounds/v1/cartoon/cartoon_boing.ogg"></audio>

  <script>
    const questions = [
      {
        
        question: "ಭಾರತದ ಸಂವಿಧಾನದ ಪ್ರಸ್ತಾವನೆಯಲ್ಲಿರುವ ‘ಸರ್ವಭೌಮ’ ಎಂಬ ಪದದ ಅರ್ಥವೇನು?",
        answers: ["ಧಾರ್ಮಿಕ ಸ್ವಾತಂತ್ರ್ಯ", "ಸ್ವತಂತ್ರ ಆಡಳಿತಾಧಿಕಾರ", "ಸಮಾನತೆ", "ನ್ಯಾಯ"],
        correct: 1
      },
      {
       
        question: "ಕರ್ನಾಟಕದ ಅತಿ ಉದ್ದದ ನದಿ ಯಾವುದು?",
        answers: ["ತುಂಗಭದ್ರಾ", "ಕಾವೇರಿ", "ಕೃಷ್ಣಾ", "ಶರಾವತಿ"],
        correct: 2
      },
      {
       
        question: "ಭಾರತದ ಮೊದಲ ಮಹಿಳಾ ರಾಜ್ಯಪಾಲರು ಯಾರು?",
        answers: ["ವಿಜಯಲಕ್ಷ್ಮಿ ಪಂಡಿತ್", "ಸರೋಜಿನಿ ನಾಯ್ಡು", "ಪ್ರತಿಭಾ ಪಾಟೀಲ್", "ಇಂದಿರಾ ಗಾಂಧಿ"],
        correct: 1
      },
      {
       
        question: "ಭಾರತದಲ್ಲಿ ಹಸಿರು ಕ್ರಾಂತಿಯ ಪಿತಾಮಹ ಯಾರು?",
        answers: ["ಎಂ.ಎಸ್.ಸ್ವಾಮಿನಾಥನ್", "ವರ್ಗೀಸ್ ಕುರಿಯನ್", "ಧೀರೂಭಾಯಿ ಅಂಬಾನಿ", "ಸಿ.ವಿ.ರಾಮನ್"],
        correct: 0
      },
      {
       
        question: "ಜನ ಗಣ ಮನ ಯಾವ ಭಾಷೆಯಲ್ಲಿ ರಚಿಸಲಾಗಿದೆ?",
        answers: ["ಹಿಂದಿ", "ಸಂಸ್ಕೃತ", "ಬೆಂಗಾಲಿ", "ಉರ್ದು"],
        correct: 2
      },
      {
       
        question: "'ಸಂಸ್ಕಾರ' ಮತ್ತು 'ಅವಸ್ಥೆ' ಎಂಬ ಪ್ರಸಿದ್ಧ ಕಾದಂಬರಿಗಳನ್ನು ಬರೆದವರು ಯಾರು?",
        answers: ["ಎಸ್.ಎಲ್. ಭೈರಪ್ಪ", "ಯು.ಆರ್. ಅನಂತಮೂರ್ತಿ", "ಪಿ. ಲಂಕೇಶ್", "ಚಂದ್ರಶೇಖರ ಕಂಬಾರ"],
        correct: 1
      },
      {
       
        question: "ಕನ್ನಡದ ಆಸ್ತಿ ಎಂದು ಯಾರನ್ನು ಕರೆಯಲಾಗುತ್ತದೆ?",
        answers: ["ಬಿ.ಎಂ. ಶ್ರೀಕಂಠಯ್ಯ", "ಕುವೆಂಪು", "ಮಾಸ್ತಿ ವೆಂಕಟೇಶ ಅಯ್ಯಂಗಾರ್", "ಆಲೂರು ವೆಂಕಟರಾವ್"],
        correct: 2
      },
      {
       
        question: "ಕನ್ನಡ ಭಾಷೆಗೆ ಕೇಂದ್ರ ಸರ್ಕಾರವು ಶಾಸ್ತ್ರೀಯ ಭಾಷೆ ಸ್ಥಾನಮಾನ ನೀಡಿದ ವರ್ಷ?",
        answers: ["2005", "2006", "2008", "2010"],
        correct: 2
      },
      {
       
        question: "ಜ್ಞಾನಪೀಠ ಪ್ರಶಸ್ತಿ ವಿಜೇತ ಮೂಕಜ್ಜಿಯ ಕನಸುಗಳು ಕಾದಂಬರಿಯ ಲೇಖಕರು ಯಾರು?",
        answers: ["ಗಿರೀಶ್ ಕಾರ್ನಾಡ್", "ಶಿವರಾಮ ಕಾರಂತ", "ವಿನಾಯಕ ಕೃಷ್ಣ ಗೋಕಾಕ್", "ಮಾಸ್ತಿ ವೆಂಕಟೇಶ ಅಯ್ಯಂಗಾರ್"],
        correct: 1
      },
      {
       
        question: "12ನೇ ಶತಮಾನದ ವಚನ ಸಾಹಿತ್ಯ ಚಳುವಳಿಯ ನೇತೃತ್ವ ವಹಿಸಿದ್ದವರು ಯಾರು?",
        answers: ["ಕುಮಾರವ್ಯಾಸ", "ಬಸವಣ್ಣ", "ಪಂಪ", "ರನ್ನ"],
        correct: 1
      },
      
    ];

    let currentQuestion = 0;
    let correctAnswers = 0;
    let wrongAnswers = 0;
    let timer;

    function playSound(id) {
      const sound = document.getElementById(id);
      sound.currentTime = 0;
      sound.play();
    }

    function startQuiz() {
      document.getElementById('result').innerHTML = '';
      document.getElementById('restartBtn').style.display = 'none';
      showQuestion();
    }

    function showQuestion() {
      clearTimeout(timer);
      document.getElementById('nextBtn').style.display = 'none';
      const q = questions[currentQuestion];
      const quizDiv = document.getElementById('quiz');
      quizDiv.innerHTML = `
        <div class="question-block">
          <div class="timer" id="timer">30</div>
          
          <div class="question">${currentQuestion + 1}. ${q.question}</div>
          <div class="answers">
            ${q.answers.map((a, i) => `
              <label onclick="selectAnswer(${i})" id="opt${i}">${a}</label>
            `).join('')}
          </div>
        </div>
      `;
      countdown(30);
    }

    function selectAnswer(selected) {
      clearInterval(timer);
      const q = questions[currentQuestion];
      q.answers.forEach((_, i) => {
        const label = document.getElementById(`opt${i}`);
        label.onclick = null;
        if (i === q.correct) label.classList.add('correct');
        else if (i === selected) label.classList.add('wrong');
      });
      if (selected === q.correct) {
        correctAnswers++;
        playSound('correctSound');
      } else {
        wrongAnswers++;
        playSound('wrongSound');
      }
      document.getElementById('nextBtn').style.display = 'inline-block';
    }

    function nextQuestion() {
      currentQuestion++;
      if (currentQuestion < questions.length) {
        showQuestion();
      } else {
        showResult();
      }
    }

    function countdown(seconds) {
      let timeLeft = seconds;
      const timerDiv = document.getElementById('timer');
      playSound('timerSound');
      timer = setInterval(() => {
        timeLeft--;
        timerDiv.textContent = timeLeft;
        if (timeLeft <= 0) {
          clearInterval(timer);
          selectAnswer(-1);
        }
      }, 1000);
    }

    function showResult() {
      document.getElementById('quiz').innerHTML = '';
      document.getElementById('nextBtn').style.display = 'none';
      document.getElementById('result').innerHTML = `
        
        <p>ಸರಿಯಾದ ಉತ್ತರಗಳು: ${correctAnswers}</p>
        <p>ತಪ್ಪಾದ ಉತ್ತರಗಳು: ${wrongAnswers}</p>
        <p>ಒಟ್ಟು ಅಂಕಗಳು: ${correctAnswers} / ${questions.length}</p>
      `;
      document.getElementById('restartBtn').style.display = 'inline-block';
    }

    function restartQuiz() {
      currentQuestion = 0;
      correctAnswers = 0;
      wrongAnswers = 0;
      startQuiz();
    }

    startQuiz();
  </script>
</body>
</html>
